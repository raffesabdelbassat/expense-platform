<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ExpenseIQ — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 28px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: rgba(255,255,255,0.3); }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
        }
        button:hover { background: #4f46e5; }
        #error {
            color: #f87171;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .switch {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }
        .switch a {
            color: #6366f1;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>💸 ExpenseIQ</h1>
        <p>Sign in to your account</p>
        <input type="email" id="email" placeholder="Email address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <p id="error"></p>
        <div class="switch">
            No account? <a onclick="register()">Register here</a>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem("token", data.access_token);
                window.location.href = "/static/dashboard.html";
            } else {
                const err = document.getElementById("error");
                err.textContent = "Invalid email or password";
                err.style.display = "block";
            }
        }

        async function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch(`/register?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
                method: "POST"
            });

            if (response.ok) {
                alert("Account created! Please sign in.");
            } else {
                const data = await response.json();
                alert(data.detail);
            }
        }
    </script>
</body>
</html>
